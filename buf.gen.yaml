version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/unmango/apis/go

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: go
    opt:
      - paths=source_relative

inputs:
  - directory: proto
    paths:
      - proto/unmango
